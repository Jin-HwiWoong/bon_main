name: Deploy Backend

on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify monorepo
        run: |
          npm run lint
          npm run typecheck
          npm run build:backend

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        env:
          IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/bone-backend
        run: |
          docker build -t $IMAGE_NAME:latest -f Dockerfile .
          docker push $IMAGE_NAME:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -eu

            IMAGE_NAME=${{ secrets.DOCKER_USERNAME }}/bone-backend

            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            docker pull $IMAGE_NAME:latest
            docker stop bone-backend || true
            docker rm bone-backend || true

            docker run -d \
              --name bone-backend \
              --restart unless-stopped \
              -p 4000:4000 \
              -e NODE_ENV=production \
              -e PORT=4000 \
              -e SESSION_SECRET="${{ secrets.SESSION_SECRET }}" \
              -e SESSION_TABLE_NAME="${{ secrets.SESSION_TABLE_NAME }}" \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
              -e OPENAI_BASE_URL="${{ secrets.OPENAI_BASE_URL }}" \
              -e LLM_MODEL="${{ secrets.LLM_MODEL }}" \
              -e EMBEDDING_MODEL="${{ secrets.EMBEDDING_MODEL }}" \
              -e EMBEDDING_DIM="${{ secrets.EMBEDDING_DIM }}" \
              -e RAG_TOP_K="${{ secrets.RAG_TOP_K }}" \
              -e RAG_MIN_SCORE="${{ secrets.RAG_MIN_SCORE }}" \
              -e LLM_PROMPT_COST_PER_1K="${{ secrets.LLM_PROMPT_COST_PER_1K }}" \
              -e LLM_COMPLETION_COST_PER_1K="${{ secrets.LLM_COMPLETION_COST_PER_1K }}" \
              $IMAGE_NAME:latest
